<!DOCTYPE html>
<html>
<head>
<title>Test 26: IntersectionObserver</title>
</head>
<body>
<h1>Test 26: IntersectionObserver (vue-observe-visibility)</h1>
<div id="status">Setting up IntersectionObservers...</div>
<div id="scroll" style="height:400px;overflow:auto;border:2px solid blue;">
    <div id="container"></div>
</div>

<script>
const container = document.getElementById('container');
const observers = [];
let visibleCount = 0;

// Create many observed elements
for (let i = 0; i < 100; i++) {
    const div = document.createElement('div');
    div.id = 'item-' + i;
    div.style.cssText = 'height:50px;margin:5px;background:#eee;display:flex;align-items:center;padding:0 10px;';
    div.textContent = 'Item ' + i + ' (not visible)';
    container.appendChild(div);

    // Observe visibility like vue-observe-visibility
    const io = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.background = '#4caf50';
                entry.target.textContent = 'Item ' + i + ' (VISIBLE)';
                visibleCount++;
            } else {
                entry.target.style.background = '#eee';
                entry.target.textContent = 'Item ' + i + ' (not visible)';
                visibleCount--;
            }
            document.getElementById('status').textContent = `Visible items: ${visibleCount}`;
        });
    }, { threshold: 0.5 });

    io.observe(div);
    observers.push(io);
}

document.getElementById('status').textContent = `Created ${observers.length} IntersectionObservers. Scroll to test.`;
</script>
</body>
</html>
