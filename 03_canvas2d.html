<!DOCTYPE html>
<html>
<head><title>Test 3: Canvas 2D</title></head>
<body>
<h1>Test 3: Canvas 2D</h1>
<canvas id="canvas" width="400" height="300" style="border:1px solid black;"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
ctx.fillStyle = 'blue';
ctx.fillRect(50, 50, 100, 100);
ctx.fillStyle = 'red';
ctx.beginPath();
ctx.arc(250, 150, 50, 0, Math.PI * 2);
ctx.fill();
document.body.innerHTML += '<p>Canvas 2D rendered successfully!</p>';
</script>
</body>
</html>
