<!DOCTYPE html>
<html>
<head><title>Test 13: Service Worker</title></head>
<body>
<h1>Test 13: Service Worker Registration</h1>
<p id="status">Attempting to register service worker...</p>
<script>
if ('serviceWorker' in navigator) {
    // Try to register a service worker (will fail but tests the API)
    navigator.serviceWorker.register('/sw.js')
        .then(reg => {
            document.getElementById('status').textContent = 'Service worker registered!';
        })
        .catch(err => {
            document.getElementById('status').textContent = 'Service worker failed (expected): ' + err.message;
        });
} else {
    document.getElementById('status').textContent = 'Service workers not supported';
}
</script>
</body>
</html>
